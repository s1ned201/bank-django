<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Банковский сайт{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Мой Банк</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" id="dashboard-link"><a class="nav-link" href="{% url 'dashboard' %}">Дашборд</a></li>
                    <li class="nav-item" id="rates-link"><a class="nav-link" href="{% url 'rates_page' %}">Курсы валют</a></li>
                    <li class="nav-item" id="login-link"><a class="nav-link" href="{% url 'login' %}">Вход</a></li>
                    <li class="nav-item d-none" id="logout-link"><a class="nav-link" href="#" onclick="logout()">Выход</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // JWT helpers
        function getAccessToken() { return localStorage.getItem('access_token'); }
        function saveTokens(access, refresh) {
            localStorage.setItem('access_token', access);
            localStorage.setItem('refresh_token', refresh);
        }
        function clearTokens() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
        }

        async function refreshAccessToken() {
            const refresh = localStorage.getItem('refresh_token');
            if (!refresh) return false;
            try {
                const response = await fetch('/api/v1/auth/token/refresh/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({refresh})
                });
                if (response.ok) {
                    const data = await response.json();
                    saveTokens(data.access, refresh);
                    return true;
                }
            } catch(e) {}
            return false;
        }

        async function apiRequest(url, options = {}) {
            let token = getAccessToken();
            if (token) {
                options.headers = {
                    ...options.headers,
                    'Authorization': `Bearer ${token}`
                };
            }
            let response = await fetch(url, options);
            if (response.status === 401 && token) {
                const refreshed = await refreshAccessToken();
                if (refreshed) {
                    token = getAccessToken();
                    options.headers['Authorization'] = `Bearer ${token}`;
                    response = await fetch(url, options);
                } else {
                    clearTokens();
                    window.location.href = '/login/';
                    return;
                }
            }
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || response.statusText);
            }
            return response.json();
        }

        function updateNav() {
            const token = getAccessToken();
            document.getElementById('login-link').classList.toggle('d-none', !!token);
            document.getElementById('dashboard-link').classList.toggle('d-none', !token);
            document.getElementById('logout-link').classList.toggle('d-none', !token);
            // Rates всегда видна
        }

        function logout() {
            clearTokens();
            window.location.href = '/login/';
        }

        // Инициализация
        updateNav();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
