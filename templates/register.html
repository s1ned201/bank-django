{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Регистрация нового клиента</h2>
        <div id="error-message" class="alert alert-danger d-none"></div>
        <form id="register-form">
            <div class="mb-3">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="password" minlength="8" required>
            </div>
            <div class="mb-3">
                <label for="first_name" class="form-label">Имя (необязательно)</label>
                <input type="text" class="form-control" id="first_name">
            </div>
            <div class="mb-3">
                <label for="last_name" class="form-label">Фамилия (необязательно)</label>
                <input type="text" class="form-control" id="last_name">
            </div>
            <div class="mb-3">
                <label for="phone_number" class="form-label">Телефон (необязательно)</label>
                <input type="text" class="form-control" id="phone_number">
            </div>
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
        <div class="mt-3">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            first_name: document.getElementById('first_name').value || '',
            last_name: document.getElementById('last_name').value || '',
            phone_number: document.getElementById('phone_number').value || null
        };
        try {
            const response = await fetch('/api/v1/auth/register/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (response.ok) {
                window.location.href = '/login/?registered=1';
            } else {
                const errorData = await response.json().catch(() => ({}));
                const msg = errorData.error?.message || 'Ошибка регистрации';
                showError(msg);
            }
        } catch (err) {
            showError('Ошибка сети');
        }
    });

    function showError(msg) {
        const errDiv = document.getElementById('error-message');
        errDiv.textContent = msg;
        errDiv.classList.remove('d-none');
    }
</script>
{% endblock %}
